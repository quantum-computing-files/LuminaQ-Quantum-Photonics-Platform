name: LuminaQ CI

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]

jobs:
  # ── Python stack ────────────────────────────────────────────────────────
  python-tests:
    name: Python tests (3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install packages (editable)
        run: |
          pip install --upgrade pip
          pip install jax jaxlib numpy scipy thewalrus matplotlib pydantic pytest pytest-cov
          pip install -e packages/lumq-photonics
          pip install -e packages/lumq-compiler
          pip install -e packages/lumq-backends

      - name: Run lumq-photonics tests
        run: pytest packages/lumq-photonics/tests/ -v --tb=short

      - name: Run lumq-compiler & lumq-backends tests
        run: pytest packages/lumq-compiler/tests/ -v --tb=short

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ── TypeScript UI ──────────────────────────────────────────────────────
  ui-build:
    name: UI build (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings=0 || true

      - name: Build
        run: npm run build

  # ── Lint (Python) ─────────────────────────────────────────────────────
  python-lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check packages/ --select=E,F,I

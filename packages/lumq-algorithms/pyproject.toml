[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lumq-algorithms"
version = "0.1.0"
description = "LuminaQ high-level quantum algorithms: GBS, VQE-CV, QML"
requires-python = ">=3.10"
dependencies = [
    "jax>=0.4.25","jaxlib>=0.4.25",
    "numpy>=1.26","scipy>=1.12",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["lumq"]


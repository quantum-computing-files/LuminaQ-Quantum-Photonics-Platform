[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lumq-compiler"
version = "0.1.0"
description = "LuminaQ circuit IR, Clements decomposer, pass pipeline"
requires-python = ">=3.10"
dependencies = ["numpy>=1.26", "scipy>=1.12"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["lumq"]

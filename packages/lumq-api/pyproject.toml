[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lumq-api"
version = "0.1.0"
description = "LuminaQ FastAPI REST + WebSocket gateway"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111","uvicorn[standard]>=0.29","websockets>=12.0",
    "pydantic>=2.6","pydantic-settings>=2.2",
    "python-multipart>=0.0.9","anyio>=4.3","numpy>=1.26"
]

[project.optional-dependencies]
dev = ["pytest>=8.0","pytest-asyncio>=0.23","httpx>=0.27"]

[tool.hatch.build.targets.wheel]
packages = ["lumq"]
